syntax = "proto3";

package arca.router.v1;

option go_package = "github.com/akam1o/arca-router/api/v1;apiv1";

// ConfigService provides configuration management operations.
// This is the internal API used by arca and the NETCONF subsystem
// to interact with the arca-routerd engine.
service ConfigService {
  // GetRunning returns the current running configuration.
  rpc GetRunning(GetRunningRequest) returns (GetRunningResponse);

  // GetCandidate returns the candidate configuration for a session.
  rpc GetCandidate(GetCandidateRequest) returns (GetCandidateResponse);

  // EditCandidate modifies the candidate configuration.
  rpc EditCandidate(EditCandidateRequest) returns (EditCandidateResponse);

  // Commit promotes the candidate to running, applying changes.
  rpc Commit(CommitRequest) returns (CommitResponse);

  // ValidateCandidate validates the candidate configuration without committing it.
  rpc ValidateCandidate(ValidateCandidateRequest) returns (ValidateCandidateResponse);

  // Discard discards candidate changes.
  rpc Discard(DiscardRequest) returns (DiscardResponse);

  // Rollback reverts to a previous commit.
  rpc Rollback(RollbackRequest) returns (RollbackResponse);

  // Diff returns the differences between candidate and running.
  rpc Diff(DiffRequest) returns (DiffResponse);

  // ListHistory returns commit history.
  rpc ListHistory(ListHistoryRequest) returns (ListHistoryResponse);
}

// SessionService manages configuration sessions with lock semantics.
service SessionService {
  // CreateSession creates a new configuration session.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

  // CloseSession closes a configuration session.
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);

  // AcquireLock acquires the candidate lock for a session.
  rpc AcquireLock(AcquireLockRequest) returns (AcquireLockResponse);

  // ReleaseLock releases the candidate lock.
  rpc ReleaseLock(ReleaseLockRequest) returns (ReleaseLockResponse);
}

// StateService provides operational state queries.
service StateService {
  // GetInterfaces returns interface operational state.
  rpc GetInterfaces(GetInterfacesRequest) returns (GetInterfacesResponse);

  // GetRoutes returns the routing table.
  rpc GetRoutes(GetRoutesRequest) returns (GetRoutesResponse);

  // GetBGPNeighbors returns BGP neighbor state.
  rpc GetBGPNeighbors(GetBGPNeighborsRequest) returns (GetBGPNeighborsResponse);

  // GetOSPFNeighbors returns OSPFv2 or OSPFv3 neighbor state.
  rpc GetOSPFNeighbors(GetOSPFNeighborsRequest) returns (GetOSPFNeighborsResponse);

  // GetRouteText returns FRR route output for CLI display.
  rpc GetRouteText(GetRouteTextRequest) returns (GetRouteTextResponse);

  // GetBGPSummaryText returns FRR BGP summary output for CLI display.
  rpc GetBGPSummaryText(GetBGPSummaryTextRequest) returns (GetBGPSummaryTextResponse);

  // GetBGPNeighborText returns FRR BGP neighbor detail output for CLI display.
  rpc GetBGPNeighborText(GetBGPNeighborTextRequest) returns (GetBGPNeighborTextResponse);

  // GetOSPFNeighborsText returns FRR OSPF neighbor output for CLI display.
  rpc GetOSPFNeighborsText(GetOSPFNeighborsTextRequest) returns (GetOSPFNeighborsTextResponse);

  // GetVRRPText returns FRR VRRP output for CLI display.
  rpc GetVRRPText(GetVRRPTextRequest) returns (GetVRRPTextResponse);

  // GetBFDText returns FRR BFD output for CLI display.
  rpc GetBFDText(GetBFDTextRequest) returns (GetBFDTextResponse);

  // GetBFDStatus returns cached FRR BFD operational state.
  rpc GetBFDStatus(GetBFDStatusRequest) returns (GetBFDStatusResponse);

  // GetLCPReconciliation returns VPP LCP reconciliation state.
  rpc GetLCPReconciliation(GetLCPReconciliationRequest) returns (GetLCPReconciliationResponse);

  // GetHAStatus returns control-plane HA convergence state.
  rpc GetHAStatus(GetHAStatusRequest) returns (GetHAStatusResponse);

  // GetRoutingInstances returns running routing-instance intent and table mapping.
  rpc GetRoutingInstances(GetRoutingInstancesRequest) returns (GetRoutingInstancesResponse);

  // GetClassOfService returns running class-of-service intent.
  rpc GetClassOfService(GetClassOfServiceRequest) returns (GetClassOfServiceResponse);

  // GetSystemInfo returns system information.
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse);
}

// TelemetryService provides structured streaming telemetry snapshots.
service TelemetryService {
  // GetTelemetryCatalog returns supported telemetry paths and metadata.
  rpc GetTelemetryCatalog(GetTelemetryCatalogRequest) returns (GetTelemetryCatalogResponse);

  // SubscribeTelemetry streams selected operational/config state paths.
  rpc SubscribeTelemetry(SubscribeTelemetryRequest) returns (stream TelemetryEvent);
}

// --- Config messages ---

message GetRunningRequest {}

message GetRunningResponse {
  string config_text = 1;  // set-command format
  uint64 version = 2;
  string commit_id = 3;
}

message GetCandidateRequest {
  string session_id = 1;
}

message GetCandidateResponse {
  string config_text = 1;
}

message EditCandidateRequest {
  string session_id = 1;
  string config_text = 2;  // set-command format to append/replace
}

message EditCandidateResponse {}

message CommitRequest {
  string session_id = 1;
  string user = 2;
  string message = 3;
}

message CommitResponse {
  string commit_id = 1;
  uint64 version = 2;
}

message ValidateCandidateRequest {
  string session_id = 1;
}

message ValidateCandidateResponse {}

message DiscardRequest {
  string session_id = 1;
}

message DiscardResponse {}

message RollbackRequest {
  string commit_id = 1;
  string user = 2;
  string message = 3;
  string session_id = 4;
}

message RollbackResponse {
  string new_commit_id = 1;
  uint64 version = 2;
}

message DiffRequest {
  string session_id = 1;
}

message DiffResponse {
  string diff_text = 1;
  bool has_changes = 2;
}

message ListHistoryRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListHistoryResponse {
  repeated CommitEntry entries = 1;
}

message CommitEntry {
  string commit_id = 1;
  string user = 2;
  string timestamp = 3;
  string message = 4;
  bool is_rollback = 5;
}

// --- Session messages ---

message CreateSessionRequest {
  string user = 1;
}

message CreateSessionResponse {
  string session_id = 1;
}

message CloseSessionRequest {
  string session_id = 1;
}

message CloseSessionResponse {}

message AcquireLockRequest {
  string session_id = 1;
  string user = 2;
}

message AcquireLockResponse {}

message ReleaseLockRequest {
  string session_id = 1;
}

message ReleaseLockResponse {}

// --- State messages ---

message GetInterfacesRequest {
  string name_filter = 1;  // optional: filter by interface name
}

message GetInterfacesResponse {
  repeated InterfaceState interfaces = 1;
}

message InterfaceState {
  string name = 1;
  string admin_status = 2;
  string oper_status = 3;
  uint64 speed = 4;
  uint32 mtu = 5;
  string mac = 6;
  uint64 rx_packets = 7;
  uint64 tx_packets = 8;
  uint64 rx_bytes = 9;
  uint64 tx_bytes = 10;
  uint64 rx_errors = 11;
  uint64 tx_errors = 12;
  repeated InterfaceRxQueue rx_queues = 13;
  repeated InterfaceTxQueue tx_queues = 14;
  string qos_profile = 15;
  uint32 ipv4_table_id = 16;
  uint32 ipv6_table_id = 17;
}

message InterfaceRxQueue {
  uint32 queue_id = 1;
  uint32 worker_id = 2;
  string mode = 3;
}

message InterfaceTxQueue {
  uint32 queue_id = 1;
  bool shared = 2;
  repeated uint32 threads = 3;
}

message GetRoutesRequest {
  string prefix_filter = 1;
  string protocol_filter = 2;
}

message GetRoutesResponse {
  repeated RouteEntry routes = 1;
}

message RouteEntry {
  string prefix = 1;
  string next_hop = 2;
  string protocol = 3;
  uint32 metric = 4;
  string interface = 5;
  bool active = 6;
}

message GetBGPNeighborsRequest {}

message GetBGPNeighborsResponse {
  repeated BGPNeighborState neighbors = 1;
}

message BGPNeighborState {
  string peer_address = 1;
  uint32 peer_as = 2;
  string state = 3;
  uint64 uptime_secs = 4;
  uint32 prefix_received = 5;
  uint32 prefix_sent = 6;
}

message GetOSPFNeighborsRequest {
  string address_family = 1;
}

message GetOSPFNeighborsResponse {
  repeated OSPFNeighborState neighbors = 1;
}

message OSPFNeighborState {
  string router_id = 1;
  string address = 2;
  string interface = 3;
  string state = 4;
  string role = 5;
  uint32 priority = 6;
  uint64 dead_time_secs = 7;
  uint64 uptime_secs = 8;
}

message GetRouteTextRequest {
  string protocol_filter = 1;
  string address_family = 2;
}

message GetRouteTextResponse {
  string output = 1;
}

message GetBGPSummaryTextRequest {}

message GetBGPSummaryTextResponse {
  string output = 1;
}

message GetBGPNeighborTextRequest {
  string peer_address = 1;
}

message GetBGPNeighborTextResponse {
  string output = 1;
}

message GetOSPFNeighborsTextRequest {
  string address_family = 1;
}

message GetOSPFNeighborsTextResponse {
  string output = 1;
}

message GetVRRPTextRequest {}

message GetVRRPTextResponse {
  string output = 1;
}

message GetBFDTextRequest {
  string peer_address = 1;
  bool brief = 2;
  bool counters = 3;
}

message GetBFDTextResponse {
  string output = 1;
}

message GetBFDStatusRequest {}

message GetBFDStatusResponse {
  string last_run = 1;
  uint32 configured_peers = 2;
  uint32 observed_peers = 3;
  uint32 up_peers = 4;
  uint32 down_peers = 5;
  uint64 session_down_events = 6;
  uint64 rx_fail_packets = 7;
  repeated BFDPeerState peers = 8;
  repeated string issues = 9;
  string last_error = 10;
}

message BFDPeerState {
  string peer = 1;
  string local_address = 2;
  string interface = 3;
  string vrf = 4;
  string status = 5;
  string diagnostic = 6;
  string remote_diagnostic = 7;
  bool observed = 8;
  bool up = 9;
  uint64 session_down_events = 10;
  uint64 rx_fail_packets = 11;
}

message GetLCPReconciliationRequest {}

message GetLCPReconciliationResponse {
  string last_run = 1;
  uint32 pair_count = 2;
  repeated string inconsistencies = 3;
  string last_error = 4;
}

message GetHAStatusRequest {}

message GetHAStatusResponse {
  bool configured = 1;
  bool converged = 2;
  uint32 vrrp_groups = 3;
  repeated string issues = 4;
  bool cluster_enabled = 5;
  uint32 cluster_nodes = 6;
  bool cluster_etcd_sync = 7;
  bool cluster_sync_aligned = 8;
  uint32 frr_vrrp_configured_groups = 9;
  uint32 frr_vrrp_observed_groups = 10;
  uint32 frr_vrrp_active_groups = 11;
  string frr_vrrp_last_check = 12;
  repeated string frr_vrrp_issues = 13;
  string frr_vrrp_last_error = 14;
  string vpp_lcp_last_check = 15;
  uint32 vpp_lcp_pairs = 16;
  repeated string vpp_lcp_inconsistencies = 17;
  string vpp_lcp_last_error = 18;
  string frr_bfd_last_check = 19;
  uint32 frr_bfd_configured_peers = 20;
  uint32 frr_bfd_observed_peers = 21;
  uint32 frr_bfd_up_peers = 22;
  uint32 frr_bfd_down_peers = 23;
  repeated string frr_bfd_issues = 24;
  string frr_bfd_last_error = 25;
}

message GetRoutingInstancesRequest {}

message GetRoutingInstancesResponse {
  repeated RoutingInstanceState instances = 1;
}

message RoutingInstanceState {
  string name = 1;
  string instance_type = 2;
  string route_distinguisher = 3;
  uint32 ipv4_table_id = 4;
  uint32 ipv6_table_id = 5;
  repeated string import_targets = 6;
  repeated string export_targets = 7;
  repeated string import_policies = 8;
  repeated string export_policies = 9;
  repeated string interfaces = 10;
}

message GetClassOfServiceRequest {}

message GetClassOfServiceResponse {
  repeated ClassOfServiceForwardingClass forwarding_classes = 1;
  repeated ClassOfServiceTrafficControlProfile traffic_control_profiles = 2;
  repeated ClassOfServiceInterface interfaces = 3;
  string enforcement_status = 4;
}

message ClassOfServiceForwardingClass {
  string name = 1;
  uint32 queue = 2;
}

message ClassOfServiceTrafficControlProfile {
  string name = 1;
  uint64 shaping_rate = 2;
  string scheduler_map = 3;
  string enforcement_status = 4;
}

message ClassOfServiceInterface {
  string name = 1;
  string output_traffic_control_profile = 2;
  string enforcement_status = 3;
}

message GetSystemInfoRequest {}

message GetSystemInfoResponse {
  string hostname = 1;
  string version = 2;
  uint64 uptime_secs = 3;
}

// --- Telemetry messages ---

message GetTelemetryCatalogRequest {
  // Optional cardinality filters, such as "single" or "per-route".
  repeated string cardinality = 1;

  // Optional payload schema filters, such as "arca.telemetry.routes.v1".
  repeated string payload_schema = 2;

  // Optional canonical path or alias filters, such as "/routes" or "/evpn".
  repeated string path = 3;

  // When true, return only paths that are part of the default subscription set.
  bool default_only = 4;

  // Optional payload encoding filters, such as "json".
  repeated string encoding = 5;
}

message GetTelemetryCatalogResponse {
  string event_schema_version = 1;
  string encoding = 2;
  repeated string default_paths = 3;
  repeated TelemetryPath paths = 4;
  uint32 default_sample_interval_ms = 5;
  uint32 min_sample_interval_ms = 6;
  uint32 max_sample_interval_ms = 7;
}

message TelemetryPath {
  string path = 1;
  string description = 2;
  string cardinality = 3;
  bool default = 4;
  repeated string aliases = 5;
  string payload_schema = 6;
}

message SubscribeTelemetryRequest {
  // Optional paths. Empty selects the safe default paths.
  repeated string paths = 1;

  // Sample interval for repeated snapshots. Zero uses the daemon default.
  uint32 sample_interval_ms = 2;

  // Send one snapshot batch and close the stream.
  bool once = 3;
}

message TelemetryEvent {
  uint64 sequence = 1;
  string timestamp = 2;
  string path = 3;
  string event_type = 4;
  string encoding = 5;
  string json_payload = 6;
  string schema_version = 7;
  uint64 payload_bytes = 8;
}
