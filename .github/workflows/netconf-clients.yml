name: NETCONF Client Interoperability

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:
  schedule:
    - cron: '17 18 * * *'

permissions:
  contents: read

jobs:
  ncclient:
    name: ncclient interop
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: tests/netconf_clients/requirements-ncclient.txt

    - name: Install ncclient
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r tests/netconf_clients/requirements-ncclient.txt

    - name: Run ncclient NETCONF interop
      run: NETCONF_INTEROP_EVIDENCE_DIR=artifacts/netconf-clients/ncclient bash tests/netconf_clients/run_interop.sh tests/netconf_clients/ncclient_interop.py

    - name: Upload ncclient evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: netconf-client-ncclient-evidence
        path: artifacts/netconf-clients/ncclient
        if-no-files-found: ignore

  libnetconf2:
    name: libnetconf2 interop
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: true

    - name: Install libnetconf2 client dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y universe
        sudo apt-get update
        sudo apt-get install -y build-essential libnetconf2-dev libssh-dev libyang2-tools openssh-client pkg-config
        pkg-config --modversion libnetconf2

    - name: Run libnetconf2 NETCONF interop
      run: NETCONF_INTEROP_EVIDENCE_DIR=artifacts/netconf-clients/libnetconf2 bash tests/netconf_clients/libnetconf2_interop.sh

    - name: Upload libnetconf2 evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: netconf-client-libnetconf2-evidence
        path: artifacts/netconf-clients/libnetconf2
        if-no-files-found: ignore

  junos-eznc:
    name: Junos PyEZ smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.5'
        cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: tests/netconf_clients/requirements-junos-eznc.txt

    - name: Install Junos PyEZ
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r tests/netconf_clients/requirements-junos-eznc.txt

    - name: Run Junos PyEZ NETCONF smoke
      run: NETCONF_INTEROP_EVIDENCE_DIR=artifacts/netconf-clients/junos-eznc bash tests/netconf_clients/run_interop.sh tests/netconf_clients/junos_eznc_smoke.py

    - name: Upload Junos PyEZ evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: netconf-client-junos-eznc-evidence
        path: artifacts/netconf-clients/junos-eznc
        if-no-files-found: ignore
