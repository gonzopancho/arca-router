name: arca-router
version: ${VERSION}
release: ${RELEASE}
epoch: 0
arch: amd64
license: Apache-2.0
vendor: akam1o
maintainer: akam1o <akam1o@ark-networks.net>
homepage: https://github.com/akam1o/arca-router
description: |
  ARCA Router - Unified VPP-based Network Router Daemon

  - Real VPP integration via govpp
  - FRR integration for dynamic routing (BGP, OSPF)
  - LCP (Linux Control Plane) support
  - Junos-style configuration interface
  - Integrated NETCONF and gRPC management APIs

# VPP and FRR dependencies
depends:
  - vpp >= 24.10
  - vpp-plugin-core >= 24.10
  - frr >= 8.0

contents:
  # Daemon binary
  - src: build/bin/arca-routerd
    dst: /usr/sbin/arca-routerd
    file_info:
      mode: 0755
      owner: root
      group: root

  # CLI binary
  - src: build/bin/arca
    dst: /usr/bin/arca
    file_info:
      mode: 0755
      owner: root
      group: root

  # Configuration directory
  - dst: /etc/arca-router
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Example configurations (installed as .example, not active configs)
  - src: examples/arca-router.conf
    dst: /etc/arca-router/arca-router.conf.example
    type: config
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: examples/hardware.yaml
    dst: /etc/arca-router/hardware.yaml.example
    type: config
    file_info:
      mode: 0644
      owner: root
      group: root

  # systemd unit files
  - src: build/systemd/arca-routerd.service
    dst: /usr/lib/systemd/system/arca-routerd.service
    file_info:
      mode: 0644
      owner: root
      group: root

  # Runtime data directory
  - dst: /var/lib/arca-router
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Log directory
  - dst: /var/log/arca-router
    type: dir
    file_info:
      mode: 0750
      owner: root
      group: root

  # logrotate configuration
  - src: build/package/logrotate.conf
    dst: /etc/logrotate.d/arca-router
    type: config
    file_info:
      mode: 0644
      owner: root
      group: root

  # Grafana dashboard for the optional Prometheus endpoint
  - src: observability/grafana/arca-routerd-dashboard.json
    dst: /usr/share/arca-router/grafana/arca-routerd-dashboard.json
    file_info:
      mode: 0644
      owner: root
      group: root

# Installation scripts
scripts:
  preinstall: build/package/scripts/preinstall.sh
  postinstall: build/package/scripts/postinstall.sh
  preremove: build/package/scripts/preuninstall.sh
  postremove: build/package/scripts/postuninstall.sh

# RPM-specific settings
rpm:
  arch: x86_64
  scripts:
    posttrans: build/package/scripts/posttrans.sh
  group: System Environment/Daemons
  compression: xz
  signature:
    key_file: ""
    key_id: ""

deb:
  arch: amd64
  fields:
    Priority: optional
    Section: net
